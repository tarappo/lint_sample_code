name: Dart Lint

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@f2c4f6686ca8e8d6e6d0f28410eeef506ed66aff # v2.18.0
        with:
          channel: stable
          flutter-version: 3.x
      - name: setup 
        run: |
          cd dart
          flutter pub get
      - name: run custom lint
        shell: /usr/bin/bash {0}
        run: |
          cd dart
          dart run custom_lint
