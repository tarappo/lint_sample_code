name: Dart Lint

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: setup 
        run: |
          cd dart
          dart pub get
      - name: run custom lint
        run: |
          cd dart
          dart run custom_lint
